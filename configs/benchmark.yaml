# Benchmark 配置：短跑 50 步，仅用于对比 throughput 和显存
model:
  name: "microsoft/Phi-tiny-MoE-instruct"
  hidden_size: 4096
  num_layers: 32
  num_heads: 16
  num_kv_heads: 4
  head_dim: 128
  intermediate_size: 448
  num_experts: 16
  num_experts_per_tok: 2
  vocab_size: 32064
  max_seq_len: 4096
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0

data:
  dataset: "openai/gsm8k"
  max_seq_len: 96
  batch_size: 1
  num_workers: 2

training:
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 10
  max_steps: 50
  grad_accum_steps: 4
  gradient_checkpointing: true
  max_grad_norm: 1.0
  dtype: "float16"
  log_interval: 10
  eval_interval: 99999
  save_interval: 99999
  output_dir: "checkpoints"

parallel:
  strategy: "ddp"
  tp_size: 1
  pp_size: 1
  ep_size: 1
  pp_micro_batches: 4
