# nanoMegatron 默认配置

model:
  name: "microsoft/Phi-tiny-MoE-instruct"   # HuggingFace 模型路径
  hidden_size: 4096
  num_layers: 32
  num_heads: 16            # Query heads
  num_kv_heads: 4          # KV heads (GQA)
  head_dim: 128
  intermediate_size: 448   # SlimMoE 压缩后的 FFN 宽度
  num_experts: 16
  num_experts_per_tok: 2   # Top-2 路由
  vocab_size: 32064
  max_seq_len: 4096
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0

data:
  dataset: "openai/gsm8k"
  max_seq_len: 128
  batch_size: 1
  num_workers: 2

training:
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 100
  max_steps: 1000
  grad_accum_steps: 4
  gradient_checkpointing: true
  max_grad_norm: 1.0
  dtype: "float16"         # V100 不支持 bf16，用 fp16
  log_interval: 10
  eval_interval: 99999    # TP 时 eval 会 hang（只有 rank 0 做 eval 但模型内 broadcast 需要所有 rank）
  save_interval: 500
  output_dir: "checkpoints"

parallel:
  strategy: "ddp"          # ddp / zero1 / zero2 / zero3 / tp / sp / pp / ep
  tp_size: 1               # 张量并行度
  pp_size: 1               # 流水线并行度
  ep_size: 1               # 专家并行度
  pp_micro_batches: 4      # 流水线 micro-batch 数
